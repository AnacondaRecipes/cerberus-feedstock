{% set name = "cerberus" %}
{% set version = "1.3.8" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/pyeve/{{ name }}/archive/refs/tags/{{ version }}.tar.gz
  sha256: 3eb480747f6b6dc6e3e6854f8388d03a2269a8fa18429b3e4a01aee01706fb03

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<37]

requirements:
  host:
    - pip
    - python
    - setuptools
    - wheel
  run:
    - python
    - importlib-metadata  # [py<38]

test:
  source_files:
    - cerberus/tests
  imports:
    - cerberus
  commands:
    - pip check
    - mkdir ${SP_DIR}/cerberus/tests  # [unix]
    - cp -r cerberus/tests ${SP_DIR}/cerberus/  # [unix]
    - md "%SP_DIR%\cerberus\tests"  # [win]
    - xcopy /E /I /Y "cerberus\tests" "%SP_DIR%\cerberus\tests"  # [win]
    - pytest --pyargs cerberus.tests
  requires:
    - pip
    - pytest

about:
  home: https://github.com/pyeve/cerberus
  license: ISC
  license_family: BSD
  license_file: LICENSE
  summary: Lightweight, extensible schema and data validation tool for Python dictionaries.
  description: |
    Cerberus provides type checking and other base functionality out of the boxand is designed
    to be non-blocking and easily and widely extensible, allowing for custom validation.
    It has no dependencies, but has the potential to become yours.
  dev_url: https://github.com/pyeve/cerberus
  doc_url: https://docs.python-cerberus.org

extra:
    recipe-maintainers:
        - kyleniemeyer
